<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi Mật Khẩu - Cổng Người Hiến Máu</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="donor.css">
</head>

<body>

    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="home.html">
                <div class="brand-icon">
                    <i class="ph-bold ph-drop" style="font-size: 20px;"></i>
                </div>
                <span class="fw-bold">BloodBank</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="home.html">Trang chủ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="events.html">Sự kiện</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="my_tickets.html">Vé của tôi</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="history.html">Lịch sử</a>
                    </li>
                    <li class="nav-item ms-lg-3 dropdown">
                        <a class="nav-link dropdown-toggle d-flex align-items-center mt-2 mt-lg-0" href="#"
                            id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <img src="https://ui-avatars.com/api/?name=Nguyen+Van+A&background=random" alt="Avatar"
                                class="rounded-circle" width="32" height="32">
                            <span class="ms-2 d-lg-none">Nguyễn Văn A</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0" aria-labelledby="navbarDropdown">
                            <li>
                                <h6 class="dropdown-header text-truncate" style="max-width: 200px;">Nguyễn Văn A</h6>
                            </li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <a class="dropdown-item d-flex align-items-center" href="profile.html">
                                    <i class="ph-bold ph-user me-2"></i> Hồ sơ cá nhân
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item d-flex align-items-center" href="change_password.html">
                                    <i class="ph-bold ph-lock-key me-2"></i> Đổi mật khẩu
                                </a>
                            </li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <a class="dropdown-item d-flex align-items-center text-danger" href="javascript:void(0)" onclick="logout()">
                                    <i class="ph-bold ph-sign-out me-2"></i> Đăng xuất
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container" style="margin-top: 100px; padding-bottom: 80px;">

        <div class="d-flex justify-content-center">
            <div class="col-12 col-md-6 col-lg-5">
                <div class="card border-0 shadow-sm p-4">
                    <div class="text-center mb-4">
                        <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-inline-flex p-3 mb-3">
                            <i class="ph-bold ph-lock-key" style="font-size: 32px;"></i>
                        </div>
                        <h4 class="fw-bold">Đổi Mật Khẩu</h4>
                        <p class="text-secondary small">Vui lòng nhập mật khẩu cũ và mới để thay đổi.</p>
                    </div>

                    <div id="alertsPlaceholder"></div>

                    <form onsubmit="handleChangePassword(event)">
                        <div class="mb-3">
                            <label for="oldPassword" class="form-label fw-medium">Mật khẩu cũ</label>
                            <input type="password" class="form-control" id="oldPassword"
                                placeholder="Nhập mật khẩu hiện tại" required>
                        </div>

                        <div class="mb-3">
                            <label for="newPassword" class="form-label fw-medium">Mật khẩu mới</label>
                            <input type="password" class="form-control" id="newPassword" placeholder="Ít nhất 6 ký tự"
                                required minlength="6">
                        </div>

                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label fw-medium">Xác nhận mật khẩu mới</label>
                            <input type="password" class="form-control" id="confirmPassword"
                                placeholder="Nhập lại mật khẩu mới" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit"
                                class="btn btn-primary rounded-pill fw-bold d-flex justify-content-center align-items-center">Lưu
                                thay đổi</button>
                            <a href="profile.html"
                                class="btn btn-light rounded-pill d-flex justify-content-center align-items-center">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="donor.js"></script>
</body>

</html>
