<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch Sử - Cổng Người Hiến Máu</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->

    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="home.html">
                <div class="brand-icon">
                    <i class="ph-bold ph-drop" style="font-size: 20px;"></i>
                </div>
                <span class="fw-bold">BloodBank</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="home.html">Trang chủ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="events.html">Sự kiện</a>

                    <li class="nav-item">
                        <a class="nav-link" href="my_tickets.html">Vé của tôi</a>
                    </li>
                    <li class="nav-item">

                    </li>
                    <li class="nav-item ms-lg-3 dropdown">
                        <a class="nav-link dropdown-toggle d-flex align-items-center mt-2 mt-lg-0" href="#"
                            id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <img src="https://ui-avatars.com/api/?name=Nguyen+Van+A&background=random" alt="Avatar"
                                class="rounded-circle" width="32" height="32">
                            <span class="ms-2 d-lg-none">Nguyễn Văn A</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0" aria-labelledby="navbarDropdown">
                            <li>
                                <h6 class="dropdown-header text-truncate" style="max-width: 200px;">Nguyễn Văn A</h6>
                            </li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <a class="dropdown-item d-flex align-items-center" href="profile.html">
                                    <i class="ph-bold ph-user me-2"></i> Hồ sơ cá nhân
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item d-flex align-items-center" href="change_password.html">
                                    <i class="ph-bold ph-lock-key me-2"></i> Đổi mật khẩu
                                </a>
                            </li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <a class="dropdown-item d-flex align-items-center text-danger" href="javascript:void(0)"

                                    <i class="ph-bold ph-sign-out me-2"></i> Đăng xuất
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>

    <div class="container" style="margin-top: 80px; padding-bottom: 80px;">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Hồ sơ sức khỏe</h4>
            <div id="bloodGroupBadge" class="badge bg-danger rounded-pill">O+</div>
        </div>

        <!-- Summary Stats -->
        <div class="row g-3 mb-5">
            <div class="col-6 col-md-3">
                <div class="p-3 bg-light rounded text-center">
                    <div class="text-danger fw-bold display-6" id="totalDonationStat">0</div>
                    <div class="small text-secondary">Lần hiến</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="p-3 bg-light rounded text-center">
                    <div class="text-primary fw-bold display-6" id="totalVolumeStat">0L</div>
                    <div class="small text-secondary">Tổng lượng máu</div>
                </div>
            </div>
        </div>

        <!-- Timeline -->
        <h5 class="fw-bold mb-4">Lịch sử hiến máu</h5>

        <div class="timeline" id="historyTimeline">
            <!-- History items will be injected here -->
        </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
