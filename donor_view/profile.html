<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Cá Nhân - Cổng Người Hiến Máu</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="donor.css">
</head>

<body>

    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="home.html">
                <div class="brand-icon">
                    <i class="ph-bold ph-drop" style="font-size: 20px;"></i>
                </div>
                <span class="fw-bold">BloodBank</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="home.html">Trang chủ</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="events.html">Sự kiện</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="my_tickets.html">Vé của tôi</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="history.html">Lịch sử</a>
                    </li>
                    <li class="nav-item ms-lg-3 dropdown">
                        <a class="nav-link dropdown-toggle d-flex align-items-center mt-2 mt-lg-0" href="#"
                            id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <img src="https://ui-avatars.com/api/?name=Nguyen+Van+A&background=random" alt="Avatar"
                                class="rounded-circle" width="32" height="32">
                            <span class="ms-2 d-lg-none">Nguyễn Văn A</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0" aria-labelledby="navbarDropdown">
                            <li>
                                <h6 class="dropdown-header text-truncate" style="max-width: 200px;">Nguyễn Văn A</h6>
                            </li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <a class="dropdown-item d-flex align-items-center" href="profile.html">
                                    <i class="ph-bold ph-user me-2"></i> Hồ sơ cá nhân
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item d-flex align-items-center" href="change_password.html">
                                    <i class="ph-bold ph-lock-key me-2"></i> Đổi mật khẩu
                                </a>
                            </li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li>
                                <a class="dropdown-item d-flex align-items-center text-danger" href="javascript:void(0)" onclick="logout()">
                                    <i class="ph-bold ph-sign-out me-2"></i> Đăng xuất
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container" style="margin-top: 100px; padding-bottom: 80px;">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Hồ sơ cá nhân</h4>
        </div>

        <div id="alertsPlaceholder"></div>

        <form onsubmit="handleProfileSave(event)">
            <div class="row g-4">

                <!-- Left Column (Avatar + Read-only Info) -->
                <div class="col-12 col-md-4">
                    <div class="card border-0 shadow-sm text-center p-4 h-100">
                        <div class="mb-3 position-relative d-inline-block mx-auto">
                            <img src="https://ui-avatars.com/api/?name=Nguyen+Van+A&background=random&size=128"
                                alt="Avatar" class="rounded-circle mb-3" width="128" height="128">
                            <button type="button"
                                class="btn btn-light btn-sm rounded-circle position-absolute bottom-0 end-0 shadow-sm border"
                                title="Đổi ảnh đại diện">
                                <i class="ph-bold ph-camera"></i>
                            </button>
                        </div>
                        <h5 class="fw-bold mb-1">Nguyễn Văn A</h5>
                        <p class="text-secondary small mb-4">Người hiến Vàng • 12 lần hiến</p>

                        <hr class="opacity-25 my-4">

                        <div class="text-start">
                            <h6 class="fw-bold text-muted small mb-3 text-uppercase">Thông tin Y tế (Cố định)</h6>

                            <div class="mb-3">
                                <label class="form-label small text-muted">Nhóm máu</label>
                                <input type="text" id="bloodType" class="form-control" value="O+" disabled readonly>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small text-muted">Nhóm Rh</label>
                                <input type="text" id="rhFactor" class="form-control" value="Dương tính (+)" disabled readonly>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column (Editable Info) -->
                <div class="col-12 col-md-8">
                    <div class="card border-0 shadow-sm p-4 h-100">
                        <h6 class="fw-bold text-muted small mb-4 text-uppercase">Thông tin cá nhân</h6>

                        <div class="row g-3">
                            <div class="col-12">
                                <label for="fullName" class="form-label fw-medium">Họ và tên</label>
                                <input type="text" class="form-control" id="fullName" value="Nguyễn Văn A" required>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="phone" class="form-label fw-medium">Số điện thoại</label>
                                <input type="tel" class="form-control" id="phone" value="0987654321" required>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="cccd" class="form-label fw-medium">Số CCCD/CMND</label>
                                <input type="text" class="form-control" id="cccd" value="001090123456" required>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="dob" class="form-label fw-medium">Ngày sinh</label>
                                <input type="date" class="form-control" id="dob" value="1995-05-15" required>
                            </div>

                            <div class="col-12 col-md-6">
                                <label for="gender" class="form-label fw-medium">Giới tính</label>
                                <select class="form-select" id="gender">
                                    <option value="male" selected>Nam</option>
                                    <option value="female">Nữ</option>
                                    <option value="other">Khác</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label for="address" class="form-label fw-medium">Địa chỉ</label>
                                <textarea class="form-control" id="address"
                                    rows="3">Số 1 Đại Cồ Việt, Hai Bà Trưng, Hà Nội</textarea>
                            </div>
                        </div>

                        <div class="mt-4 pt-3 text-end border-top">
                            <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold">
                                <i class="ph-bold ph-floppy-disk me-2"></i>Lưu thay đổi
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </form>

    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="donor.js"></script>
</body>

</html>
