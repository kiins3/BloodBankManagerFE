<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - BloodBank VN</title>
    <link rel="stylesheet" href="../css/auth.css">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>
    <div class="auth-container">
        <!-- Return Home Link -->
        <a href="landing.html" class="back-home">
            <i class="ph-bold ph-arrow-left"></i> Quay lại trang chủ
        </a>

        <!-- Left: Image -->
        <div class="auth-image"
            style="background-image: url('https://images.unsplash.com/photo-1576091160399-112ba8d25d1d?auto=format&fit=crop&q=80');">
        </div>

        <!-- Right: Form -->
        <div class="auth-form-container">
            <div class="auth-form">
                <a href="#" class="brand">
                    <div class="brand-icon">
                        <i class="ph-bold ph-drop"></i>
                    </div>
                    <div class="brand-text">BloodBank VN</div>
                </a>

                <div class="form-header">
                    <h2>Đăng ký thành viên</h2>
                    <p>Tham gia cộng đồng hiến máu ngay hôm nay.</p>
                </div>

                <form id="registerForm">
                    <div class="form-group">
                        <label class="form-label">Họ và tên</label>
                        <div class="input-wrapper">
                            <i class="ph ph-user input-icon"></i>
                            <input type="text" id="name" class="form-control" placeholder="Nguyễn Văn A" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <div class="input-wrapper">
                            <i class="ph ph-envelope input-icon"></i>
                            <input type="email" id="email" class="form-control" placeholder="email@example.com"
                                required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Số điện thoại</label>
                        <div class="input-wrapper">
                            <i class="ph ph-phone input-icon"></i>
                            <input type="tel" id="phone" class="form-control" placeholder="0912345678" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Số CCCD / CMND</label>
                        <div class="input-wrapper">
                            <i class="ph ph-identification-card input-icon"></i>
                            <input type="text" id="cccd" class="form-control" placeholder="012345678912" required>
                        </div>
                    </div>



                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="terms" required>
                        <label class="form-check-label" for="terms">
                            Tôi đồng ý với <a href="#">Điều khoản sử dụng</a> & <a href="#">Chính sách bảo mật</a>
                        </label>
                    </div>

                    <button type="submit" class="btn-primary">Đăng ký</button>

                    <div class="auth-footer">
                        Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="../js/auth.js"></script>
</body>

</html>
